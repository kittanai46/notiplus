<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NotiPlus</title>
  <style>
    :root { --primary: #6c63ff; --primary-dark: #5a52d5; --bg: #f0f2ff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans Thai', sans-serif;
      background: var(--bg);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #6c63ff 0%, #3f3d8f 100%);
      padding: 22px 28px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 21px; font-weight: 700; }
    .header .sub { font-size: 12px; opacity: 0.75; margin-top: 2px; }
    .device-badge {
      background: rgba(255,255,255,0.18);
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 13px;
    }

    /* Layout */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px 24px;
      box-shadow: 0 2px 20px rgba(108,99,255,0.07);
    }
    .card-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 14px; }

    /* Form */
    label { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 4px; display: block; }
    input, textarea {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid #e8e8f0; border-radius: 8px;
      font-size: 14px; outline: none; transition: border-color 0.2s;
      margin-bottom: 12px; font-family: inherit; background: #fafafa;
    }
    input:focus, textarea:focus { border-color: var(--primary); background: white; }
    textarea { resize: vertical; min-height: 72px; }

    /* Image preview */
    .preview-wrap {
      display: none;
      margin-bottom: 12px;
      background: #f5f5f5;
      border-radius: 10px;
      border: 1.5px solid #e8e8f0;
      overflow: hidden;
      text-align: center;
    }
    .preview-wrap img {
      max-width: 100%;
      max-height: 220px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }
    .image-warn {
      display: none; margin-bottom: 12px; padding: 8px 12px;
      border-radius: 8px; background: #fff8e1; color: #e65100; font-size: 12px;
    }

    /* Toggle tabs */
    .tab-group {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .tab-btn {
      flex: 1; padding: 9px; border: 1.5px solid #e0e0e0;
      border-radius: 8px; background: white; color: #888;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .tab-btn.active {
      background: var(--primary); color: white; border-color: var(--primary);
    }

    /* Buttons */
    .btn {
      width: 100%; padding: 11px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { background: #c0bdf5; cursor: not-allowed; }

    /* Status */
    .status { margin-top: 10px; padding: 9px 12px; border-radius: 8px; font-size: 13px; display: none; }
    .status.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .status.error   { background: #ffebee; color: #c62828; display: block; }

    /* Scheduled list */
    .scheduled-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; border: 1.5px solid #eeeeee;
      border-radius: 10px; margin-bottom: 8px;
    }
    .scheduled-item .info { flex: 1; min-width: 0; }
    .s-title { font-size: 14px; font-weight: 600; color: #1a1a2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .s-meta  { font-size: 12px; color: #999; margin-top: 2px; }
    .s-img { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .badge { font-size: 11px; padding: 3px 9px; border-radius: 99px; font-weight: 600; white-space: nowrap; }
    .badge-pending   { background: #e8eaf6; color: #3949ab; }
    .badge-sent      { background: #e8f5e9; color: #388e3c; }
    .badge-cancelled { background: #f5f5f5; color: #9e9e9e; }
    .btn-sm-cancel {
      background: none; border: 1.5px solid #ef9a9a; color: #e53935;
      padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap;
    }
    .btn-sm-cancel:hover { background: #ffebee; }
    .empty { text-align: center; color: #bbb; font-size: 13px; padding: 24px 0; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>🔔 NotiPlus</h1>
    <div class="sub">แดชบอร์ดส่งการแจ้งเตือน</div>
  </div>
  <div id="badge" class="device-badge" style="display:none">
    ● <span id="connCount">0</span> อุปกรณ์ออนไลน์
  </div>
</div>

<div class="container">

  <!-- Form Card -->
  <div class="card">
    <div class="card-title">📢 ส่งการแจ้งเตือน</div>

    <!-- Toggle -->
    <div class="tab-group">
      <button class="tab-btn active" id="tabNow" onclick="switchTab('now')">⚡ ส่งเดี๋ยวนี้</button>
      <button class="tab-btn" id="tabSchedule" onclick="switchTab('schedule')">🕐 ตั้งเวลาล่วงหน้า</button>
    </div>

    <label>หัวข้อ</label>
    <input id="title" type="text" placeholder="หัวข้อการแจ้งเตือน" />

    <label>ข้อความ</label>
    <textarea id="body" rows="3" placeholder="ข้อความการแจ้งเตือน"></textarea>

    <label>URL รูปภาพ <span style="font-weight:400;color:#bbb">(ไม่บังคับ)</span></label>
    <input id="imageUrl" type="url" placeholder="https://example.com/image.jpg" />
    <div class="preview-wrap" id="previewWrap"><img id="imagePreview" alt="preview" /></div>
    <div id="imageWarn" class="image-warn">⚠️ ไม่สามารถแสดงตัวอย่างได้ (hotlink protection) — การแจ้งเตือนยังคงส่งรูปภาพได้</div>

    <!-- Schedule only: datetime -->
    <div id="scheduleFields" style="display:none">
      <label>วันและเวลาที่ต้องการส่ง</label>
      <input id="sDateTime" type="datetime-local" />
    </div>

    <button class="btn btn-primary" id="submitBtn" onclick="handleSubmit()">ส่งการแจ้งเตือน</button>
    <div id="formStatus" class="status"></div>
  </div>

  <!-- Scheduled List -->
  <div class="card">
    <div class="card-title">📋 รายการที่ตั้งเวลาไว้</div>
    <div id="scheduledList"></div>
  </div>

</div>

<script>
  const API_URL  = 'https://notiplus-api.k-kittanai46.workers.dev';
  const WS_ADMIN = 'wss://notiplus-api.k-kittanai46.workers.dev/ws-admin';

  let currentTab = 'now';

  // Real-time device count
  function connectAdmin() {
    const ws = new WebSocket(WS_ADMIN);
    ws.onmessage = (e) => {
      const d = JSON.parse(e.data);
      if (d.connected !== undefined) {
        document.getElementById('connCount').textContent = d.connected;
        document.getElementById('badge').style.display = 'inline-block';
      }
    };
    ws.onclose = () => setTimeout(connectAdmin, 3000);
    ws.onerror = () => ws.close();
  }
  connectAdmin();

  // Tab switch
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabNow').classList.toggle('active', tab === 'now');
    document.getElementById('tabSchedule').classList.toggle('active', tab === 'schedule');
    document.getElementById('scheduleFields').style.display = tab === 'schedule' ? 'block' : 'none';
    document.getElementById('submitBtn').textContent = tab === 'now' ? 'ส่งการแจ้งเตือน' : 'เพิ่มในรายการตั้งเวลา';
    clearStatus('formStatus');
  }

  // Image preview
  document.getElementById('imageUrl').addEventListener('input', (e) => {
    const url = e.target.value.trim();
    const wrap = document.getElementById('previewWrap');
    const img  = document.getElementById('imagePreview');
    const warn = document.getElementById('imageWarn');
    wrap.style.display = 'none';
    warn.style.display = 'none';
    if (url) {
      img.onerror = () => { wrap.style.display = 'none'; warn.style.display = 'block'; };
      img.onload  = () => { warn.style.display = 'none'; wrap.style.display = 'block'; };
      img.src = url;
    }
  });

  // Handle submit
  async function handleSubmit() {
    if (currentTab === 'now') await sendNow();
    else addSchedule();
  }

  // Send now
  async function sendNow() {
    const title    = document.getElementById('title').value.trim();
    const body     = document.getElementById('body').value.trim();
    const imageUrl = document.getElementById('imageUrl').value.trim();
    const btn      = document.getElementById('submitBtn');

    clearStatus('formStatus');
    if (!title) return showStatus('formStatus', 'error', 'กรุณากรอกหัวข้อ');
    if (!body)  return showStatus('formStatus', 'error', 'กรุณากรอกข้อความ');

    btn.disabled = true; btn.textContent = 'กำลังส่ง…';
    try {
      const res = await apiFetch({ title, body, ...(imageUrl ? { imageUrl } : {}) });
      const data = await res.json();
      if (res.ok) {
        showStatus('formStatus', 'success', `✓ ส่งไปยัง ${data.sent} อุปกรณ์แล้ว`);
        clearForm();
      } else {
        showStatus('formStatus', 'error', data.error || 'ส่งไม่สำเร็จ');
      }
    } catch (e) {
      showStatus('formStatus', 'error', `เกิดข้อผิดพลาด: ${e.message}`);
    } finally {
      btn.disabled = false; btn.textContent = 'ส่งการแจ้งเตือน';
    }
  }

  // Schedule
  function addSchedule() {
    const title    = document.getElementById('title').value.trim();
    const body     = document.getElementById('body').value.trim();
    const imageUrl = document.getElementById('imageUrl').value.trim();
    const dateTime = document.getElementById('sDateTime').value;

    clearStatus('formStatus');
    if (!title)    return showStatus('formStatus', 'error', 'กรุณากรอกหัวข้อ');
    if (!body)     return showStatus('formStatus', 'error', 'กรุณากรอกข้อความ');
    if (!dateTime) return showStatus('formStatus', 'error', 'กรุณาเลือกวันและเวลา');

    const at = new Date(dateTime);
    if (at <= new Date()) return showStatus('formStatus', 'error', 'กรุณาเลือกเวลาในอนาคต');

    const list = getList();
    list.unshift({ id: Date.now(), title, body, imageUrl: imageUrl || null, at: at.toISOString(), status: 'pending' });
    saveList(list);
    renderList();
    clearForm();
    showStatus('formStatus', 'success', '✓ เพิ่มในรายการตั้งเวลาแล้ว');
  }

  function cancelItem(id) {
    const list = getList().map(i => i.id === id ? { ...i, status: 'cancelled' } : i);
    saveList(list);
    renderList();
  }

  function clearForm() {
    ['title', 'body', 'imageUrl', 'sDateTime'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('previewWrap').style.display = 'none';
    document.getElementById('imageWarn').style.display = 'none';
  }

  function getList() { return JSON.parse(localStorage.getItem('notiplus_scheduled') || '[]'); }
  function saveList(l) { localStorage.setItem('notiplus_scheduled', JSON.stringify(l)); }

  async function checkScheduled() {
    const now = new Date();
    const list = getList();
    let changed = false;
    for (const item of list) {
      if (item.status === 'pending' && new Date(item.at) <= now) {
        try {
          await apiFetch({ title: item.title, body: item.body, ...(item.imageUrl ? { imageUrl: item.imageUrl } : {}) });
        } catch(_) {}
        item.status = 'sent';
        changed = true;
      }
    }
    if (changed) { saveList(list); renderList(); }
  }

  function renderList() {
    const cutoff = Date.now() - 86400000;
    const list = getList().filter(i => new Date(i.at) >= cutoff || i.status === 'pending');
    const el = document.getElementById('scheduledList');
    if (!list.length) {
      el.innerHTML = '<div class="empty">ยังไม่มีรายการที่ตั้งเวลาไว้</div>';
      return;
    }
    el.innerHTML = list.map(item => {
      const timeStr = new Date(item.at).toLocaleString('th-TH', { dateStyle: 'short', timeStyle: 'short' });
      const bClass = { pending: 'badge-pending', sent: 'badge-sent', cancelled: 'badge-cancelled' }[item.status];
      const bText  = { pending: 'รอส่ง', sent: 'ส่งแล้ว', cancelled: 'ยกเลิก' }[item.status];
      const cancel = item.status === 'pending'
        ? `<button class="btn-sm-cancel" onclick="cancelItem(${item.id})">ยกเลิก</button>` : '';
      const imgEl = item.imageUrl
        ? `<img class="s-img" src="${item.imageUrl}" onerror="this.style.display='none'" alt="img" />` : '';
      return `
        <div class="scheduled-item">
          ${imgEl}
          <div class="info">
            <div class="s-title">${item.title}</div>
            <div class="s-meta">${item.body} · ${timeStr}</div>
          </div>
          <span class="badge ${bClass}">${bText}</span>
          ${cancel}
        </div>`;
    }).join('');
  }

  function apiFetch(body) {
    return fetch(`${API_URL}/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
  }

  function showStatus(id, type, msg) {
    const el = document.getElementById(id);
    el.className = `status ${type}`;
    el.textContent = msg;
  }
  function clearStatus(id) { document.getElementById(id).className = 'status'; }

  checkScheduled();
  setInterval(checkScheduled, 30000);
  renderList();
</script>
</body>
</html>
